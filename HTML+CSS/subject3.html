<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .header{
            background : lightgray;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding : 0 20px;
        }

        .menu {
            display : flex;
            list-style: none;
            gap : 20px;
            
        }

        .menu > li {
            position: relative;
        }

        .menu li:hover {
            background: white;
            height:100%;
        }

        .user {
            display: flex;
            gap : 15px;
        }


        .sub{
            display:none;
            position: absolute;
            background: white;
            border-bottom:1px solid black;
            left: 0;
            top: 100%;
            width: 70px;
            padding:10px;
        }

        li:hover .sub{
            display : block
        }

        .sub li {
            list-style: none;
        }
        
        .sub li:hover{
            border-bottom: 1px solid black;
            background: lightgray;
        }

        .menu_sub::after{
            content : "+";
            margin-left: 5px;
        }

        .menu_sub:hover::after {
            content :  "+";
        }
        
    </style>
</head>
<body>
    <header class = "header">
        <div class = "logo">LOGO</div>
        
        <ul class = "menu">
            <li class = "menu_sub">도서관소개
                <ul class = "sub">
                    <li>연혁</li>
                    <li>소개</li>
                </ul>
            </li>
            <li class = "menu_sub">도서자료실
                <ul class = "sub">
                    <li>신간도서</li>
                    <li>인기도서</li>
                </ul>
            </li>
            <li class = "menu_sub">회원서비스
                <ul class = "sub">
                    <li>로그인</li>
                    <li>회원가입</li>
                </ul>
            </li>
            <li>도서검색</li>
            <li>도서관리자</li>
        </ul>

        <div class="user">
            <span>로그인</span>
            <span>회원가입</span>
        </div>
    </header>
</body>
</html>
