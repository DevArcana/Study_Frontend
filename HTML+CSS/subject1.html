<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .header{
            background:lightgray;
            height: 70px;
            padding: 0 20px;
            display:flex;
            justify-content: space-between;

        .menu {

            display:flex;
            gap: 20px;
            
        }

        .user{

            gap:15px;
        }

</head>

    <header class = "header">
        <div class="logo">LOGO</div>

        <ul class = "menu">
            <li>도서관소개</li>
            <li>도서자료실</li>
            <li>회원서비스</li>
        </ul>

        <div class="user">
            <span>로그인</span>
            <span>회원가입</span>
        </div>
    </header>
</body>
</html>
