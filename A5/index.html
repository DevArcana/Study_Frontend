<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        .container{
            inset: 0;

            display : flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        ul {
            background-color: #e1e1e1;
            border-radius: 8px;
            list-style: none;
            padding-left: 0;
            width:800px;
        }

        ul li{
            padding: 15px 25px;
            font-size: 18px;
            display:flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid gray ;
            
            
        }

        p{
            
            flex : 1;
        }

        .Button-red {
            margin-right: 15px;
            background-color: red;
            width: 100px;
            height : 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 999px;
            color: #ffffff;
        }

        


    </style>
</head>
<body>

            <li><span class = "Button-blue">안내</span> 온라인 교육과정 개설 안내 <span>2026-01-08</span></li>
            <li><span class = "Button-blue">공지</span> 2026년 1분기 교육일정 발표 <span>2026-01-05</span></li>
            <li><span class = "Button-blue">안내</span> 홈페이지 점검 일정 안내 <span>2026-01-03</span></li>
        </ul>
    </div>
</body>
</html>
